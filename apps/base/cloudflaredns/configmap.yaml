apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflaredns-script
  namespace: cloudflaredns
data:
  update-dns.sh: |
    #!/bin/sh
    set -e

    # Get current public IP
    CURRENT_IP=$(wget -qO- https://1.1.1.1/cdn-cgi/trace | grep 'ip=' | cut -d= -f2)
    if [ -z "$CURRENT_IP" ]; then
      echo "ERROR: Failed to get current public IP"
      exit 1
    fi
    echo "Current public IP: $CURRENT_IP"

    update_record() {
      ZONE_ID=$1
      RECORD_NAME=$2

      # Get record ID and current IP
      RECORD_DATA=$(wget -qO- \
        --header="Authorization: Bearer $CF_API_TOKEN" \
        --header="Content-Type: application/json" \
        "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$RECORD_NAME")

      RECORD_ID=$(echo "$RECORD_DATA" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
      RECORD_IP=$(echo "$RECORD_DATA" | sed -n 's/.*"content":"\([^"]*\)".*/\1/p' | head -1)

      if [ -z "$RECORD_ID" ]; then
        echo "WARNING: No A record found for $RECORD_NAME"
        return
      fi

      if [ "$RECORD_IP" = "$CURRENT_IP" ]; then
        echo "OK: $RECORD_NAME is already $CURRENT_IP"
        return
      fi

      echo "UPDATING: $RECORD_NAME from $RECORD_IP to $CURRENT_IP"
      RESULT=$(wget -qO- \
        --header="Authorization: Bearer $CF_API_TOKEN" \
        --header="Content-Type: application/json" \
        --method=PATCH \
        --body-data="{\"content\":\"$CURRENT_IP\"}" \
        "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID")

      if echo "$RESULT" | grep -q '"success":true'; then
        echo "SUCCESS: Updated $RECORD_NAME to $CURRENT_IP"
      else
        echo "ERROR: Failed to update $RECORD_NAME"
        echo "$RESULT"
      fi
    }

    # milanchis.com zone
    echo "--- milanchis.com ---"
    update_record "$CF_ZONE_MILANCHIS" "milanchis.com"
    update_record "$CF_ZONE_MILANCHIS" "*.milanchis.com"

    # streamsquire.app zone
    echo "--- streamsquire.app ---"
    update_record "$CF_ZONE_STREAMSQUIRE" "streamsquire.app"
    update_record "$CF_ZONE_STREAMSQUIRE" "*.streamsquire.app"
    update_record "$CF_ZONE_STREAMSQUIRE" "www.streamsquire.app"

    echo "Done."
