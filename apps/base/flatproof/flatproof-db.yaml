---
apiVersion: v1
kind: Service
metadata:
  name: flatproof-db
spec:
  type: ClusterIP
  selector:
    app: flatproof-db
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flatproof-db
  labels:
    app: flatproof-db
spec:
  serviceName: flatproof-db
  replicas: 1
  selector:
    matchLabels:
      app: flatproof-db
  template:
    metadata:
      labels:
        app: flatproof-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: flatproof
            - name: POSTGRES_USER
              value: flatproof
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zion-flatproof-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
