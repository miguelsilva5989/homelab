apiVersion: apps/v1
kind: Deployment
metadata:
  name: glyphforge
  labels:
    app: glyphforge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: glyphforge
  template:
    metadata:
      labels:
        app: glyphforge
    spec:
      imagePullSecrets:
        - name: zion-regcred
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: glyphforge
          image: registry.milanchis.com/glyphforge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
