image:
  registry: registry.milanchis.com
  repository: aip/rafm
  tag: 8.0.1
  pullSecrets:
    - zion-regcred

volumePermissions:
  image:
    registry: registry.milanchis.com
    repository: aip/base
    tag: 0.6.5

performRegistration: true
pageManagerUrl: "http://page-manager.xupa.svc.cluster.local:40353/page-manager"
productURL: "/rafm"
productPort: "40353"

deployment:
  license:
    secretName: xupa-license

product-config:
  DbDatabase: raid
  DbHost: zion-xupa-db
  DbPort: 5432
  DbRdbms: Postgresql
  DbCreateUsers: false
  DbCreateDATUser: false
  DbUsersAdmUser: ras_adm
  DbUsersAdmPwd: ras_adm
  DbUsersAppUser: ras_app
  DbUsersAppPwd: ras_app
  DbUsersDatUser: ras_dat
  DbUsersDatPwd: ras_dat
  DbUsersDbaUser: raid
  DbUsersDbaPwd: raid
  DbTablespacesTemp: pg_default
  DbTablespacesDefault: pg_default
  DbTablespacesLargeData: pg_default
  DbTablespacesLargeIndex: pg_default
  DbTablespacesMediumData: pg_default
  DbTablespacesMediumIndex: pg_default
  DbTablespacesSmallData: pg_default
  DbTablespacesSmallIndex: pg_default
  DbTablespacesLOB: pg_default
  EnablePartitioning: false
  AuthServerURL: "http://zion-xupa-keycloak:8080/keycloak"
  Realm: mobileum
  ClientId: mobileum
  KeycloakAdminUser: adm
  KeycloakAdminPwd: Password1
  InternalServerCommunicationPwd: raid
  HttpRelativePath: "/rafm"
  ServerMemoryOptions: "-Xms128M -Xmx1024M -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxMetaspaceSize=1G -Dwedo.override.datediff.function=false -Denable.postgres.merge=true"
  ConnMngrMaxConnections: "500"
  HsqlMode: FILE
