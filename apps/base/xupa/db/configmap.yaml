apiVersion: v1
kind: ConfigMap
metadata:
  name: xupa-db-init
data:
  init.sql: |
    -- RAID 9.3 Database Initialization
    -- Single raid DB, separate schemas for RAFM (ras_*) and Page Manager (pm_*)
    -- DbCreateUsers=false in product configs — init SQL creates all users/roles.
    -- Uses DO blocks for idempotency (safe on restart).

    -- Keycloak
    DO $$ BEGIN CREATE USER keycloak WITH PASSWORD 'keycloak'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    SELECT 'CREATE DATABASE keycloak OWNER keycloak ENCODING ''UTF8''' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec

    -- Extensions
    CREATE EXTENSION IF NOT EXISTS btree_gin;

    -- ============================================================
    -- RAFM users/schemas/roles (ras_*)
    -- ============================================================
    DO $$ BEGIN CREATE ROLE "ras_adm_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_adm_S"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_adm_SIUD"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_app_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_dat_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_dat_S"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "ras_dat_SIUD"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;

    DO $$ BEGIN CREATE USER "ras_adm" WITH PASSWORD 'ras_adm'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "ras_adm" AUTHORIZATION "ras_adm";
    GRANT USAGE ON SCHEMA "ras_adm" TO PUBLIC;
    GRANT CREATE ON SCHEMA "ras_adm" TO "ras_adm";
    GRANT CREATE ON TABLESPACE pg_default TO "ras_adm";
    GRANT "ras_adm_SysPriv" TO "ras_adm";
    ALTER USER "ras_adm" SET SEARCH_PATH = "ras_adm", PUBLIC;

    DO $$ BEGIN CREATE USER "ras_app" WITH PASSWORD 'ras_app'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "ras_app" AUTHORIZATION "ras_app";
    GRANT USAGE ON SCHEMA "ras_app" TO PUBLIC;
    GRANT CREATE ON SCHEMA "ras_app" TO "ras_app";
    GRANT CREATE ON TABLESPACE pg_default TO "ras_app";
    GRANT "ras_adm_SIUD" TO "ras_app";
    GRANT "ras_dat_SIUD" TO "ras_app";
    GRANT "ras_app_SysPriv" TO "ras_app";

    DO $$ BEGIN CREATE USER "ras_dat" WITH PASSWORD 'ras_dat'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "ras_dat" AUTHORIZATION "ras_dat";
    GRANT USAGE ON SCHEMA "ras_dat" TO PUBLIC;
    GRANT CREATE ON SCHEMA "ras_dat" TO "ras_dat";
    GRANT CREATE ON TABLESPACE pg_default TO "ras_dat";
    GRANT "ras_adm_SIUD" TO "ras_dat";
    GRANT "ras_dat_SIUD" TO "ras_dat";
    GRANT "ras_dat_SysPriv" TO "ras_dat";

    ALTER USER "ras_app" SET SEARCH_PATH = "ras_app", "ras_dat", "ras_adm", PUBLIC;
    ALTER USER "ras_dat" SET SEARCH_PATH = "ras_dat", "ras_adm", "ras_app", PUBLIC;

    -- ============================================================
    -- Page Manager users/schemas/roles (pm_*)
    -- ============================================================
    DO $$ BEGIN CREATE ROLE "pm_adm_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_adm_S"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_adm_SIUD"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_app_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_dat_SysPriv"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_dat_S"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    DO $$ BEGIN CREATE ROLE "pm_dat_SIUD"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;

    DO $$ BEGIN CREATE USER "pm_adm" WITH PASSWORD 'pm_adm'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "pm_adm" AUTHORIZATION "pm_adm";
    GRANT USAGE ON SCHEMA "pm_adm" TO PUBLIC;
    GRANT CREATE ON SCHEMA "pm_adm" TO "pm_adm";
    GRANT CREATE ON TABLESPACE pg_default TO "pm_adm";
    GRANT "pm_adm_SysPriv" TO "pm_adm";
    ALTER USER "pm_adm" SET SEARCH_PATH = "pm_adm", PUBLIC;

    DO $$ BEGIN CREATE USER "pm_app" WITH PASSWORD 'pm_app'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "pm_app" AUTHORIZATION "pm_app";
    GRANT USAGE ON SCHEMA "pm_app" TO PUBLIC;
    GRANT CREATE ON SCHEMA "pm_app" TO "pm_app";
    GRANT CREATE ON TABLESPACE pg_default TO "pm_app";
    GRANT "pm_adm_SIUD" TO "pm_app";
    GRANT "pm_dat_SIUD" TO "pm_app";
    GRANT "pm_app_SysPriv" TO "pm_app";

    DO $$ BEGIN CREATE USER "pm_dat" WITH PASSWORD 'pm_dat'; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
    CREATE SCHEMA IF NOT EXISTS "pm_dat" AUTHORIZATION "pm_dat";
    GRANT USAGE ON SCHEMA "pm_dat" TO PUBLIC;
    GRANT CREATE ON SCHEMA "pm_dat" TO "pm_dat";
    GRANT CREATE ON TABLESPACE pg_default TO "pm_dat";
    GRANT "pm_adm_SIUD" TO "pm_dat";
    GRANT "pm_dat_SIUD" TO "pm_dat";
    GRANT "pm_dat_SysPriv" TO "pm_dat";

    ALTER USER "pm_app" SET SEARCH_PATH = "pm_app", "pm_dat", "pm_adm", PUBLIC;
    ALTER USER "pm_dat" SET SEARCH_PATH = "pm_dat", "pm_adm", "pm_app", PUBLIC;
