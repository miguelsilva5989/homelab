---
apiVersion: v1
kind: Service
metadata:
  name: streamsquire-db
spec:
  type: ClusterIP
  selector:
    app: streamsquire-db
  ports:
  - name: postgres
    protocol: TCP
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: streamsquire-db
  labels:
    app: streamsquire-db
spec:
  serviceName: streamsquire-db
  replicas: 1
  selector:
    matchLabels:
      app: streamsquire-db
  template:
    metadata:
      labels:
        app: streamsquire-db
    spec:
      containers:
      - name: postgres
        image: postgres:17-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: streamsquire
        - name: POSTGRES_USER
          value: streamsquire
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zion-streamamus-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 2Gi
