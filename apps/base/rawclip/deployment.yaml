apiVersion: apps/v1
kind: Deployment
metadata:
  name: rawclip
  labels:
    app: rawclip
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rawclip
  template:
    metadata:
      labels:
        app: rawclip
    spec:
      imagePullSecrets:
      - name: zion-regcred
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: rawclip
        image: registry.milanchis.com/streamsquire-relay:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 9430
        env:
          - name: RELAY_PORT
            value: "9430"
          - name: BETTER_AUTH_URL
            value: "https://relay.streamsquire.app"
          - name: BETTER_AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: BETTER_AUTH_SECRET
          - name: TWITCH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: TWITCH_CLIENT_ID
          - name: TWITCH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: TWITCH_CLIENT_SECRET
          - name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: GOOGLE_CLIENT_ID
          - name: GOOGLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: GOOGLE_CLIENT_SECRET
          - name: KICK_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: KICK_CLIENT_ID
          - name: KICK_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: KICK_CLIENT_SECRET
          - name: STREAMSQUIRE_LICENSE_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: STREAMSQUIRE_LICENSE_SIGNING_KEY
          - name: RELAY_OWNER_EMAIL
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: RELAY_OWNER_EMAIL
          - name: PADDLE_SANDBOX
            value: "true"   # flip to "false" to go live
          - name: PADDLE_API_KEY_TEST
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: PADDLE_API_KEY_TEST
          - name: PADDLE_API_KEY_LIVE
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: PADDLE_API_KEY_LIVE
          - name: PADDLE_WEBHOOK_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: PADDLE_WEBHOOK_SECRET
          - name: ELEVENLABS_API_KEY
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: ELEVENLABS_API_KEY
          - name: RELAY_AI_API_KEY
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: RELAY_AI_API_KEY
          - name: RELAY_AI_MODEL
            value: "gemini-3.1-flash-lite-preview"
          - name: RELAY_AI_BASE_URL
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: RELAY_AI_BASE_URL
          - name: RESEND_API_KEY
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: RESEND_API_KEY
          - name: RESEND_FROM
            value: "StreamSquire <noreply@mail.streamsquire.app>"
          - name: RESEND_AUDIENCE_ID
            value: "e65e27df-2878-4edc-a4cc-c68d9b923422"
          - name: R2_PUBLIC_URL
            value: "https://releases.streamsquire.app"
          - name: R2_ACCOUNT_ID
            value: "f34b3fe24561d07b0afd2ae6869a5446"
          - name: R2_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: R2_ACCESS_KEY_ID
          - name: R2_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: R2_SECRET_ACCESS_KEY
          - name: DISCORD_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_CLIENT_ID
          - name: DISCORD_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_CLIENT_SECRET
          - name: DISCORD_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_BOT_TOKEN
          - name: DISCORD_GUILD_ID
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_GUILD_ID
          - name: DISCORD_ROLE_KNIGHT
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_ROLE_KNIGHT
          - name: DISCORD_ROLE_SOVEREIGN
            valueFrom:
              secretKeyRef:
                name: zion-streamamus-secret
                key: DISCORD_ROLE_SOVEREIGN
          - name: RELAY_DB_PATH
            value: /app/data/relay.sqlite
        volumeMounts:
          - name: data-volume
            mountPath: /app/data
          - name: backups-volume
            mountPath: /app/data/backups

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: streamamus-pvc
        - name: backups-volume
          persistentVolumeClaim:
            claimName: rawclip-backups-pvc

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
