apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: flatproof-ingressroute-certificate
  namespace: flatproof
spec:
  secretName: flatproof-certificate-secret
  issuerRef:
    name: cloudflare-clusterissuer
    kind: ClusterIssuer
  dnsNames:
    - flatproof.app
    - www.flatproof.app
